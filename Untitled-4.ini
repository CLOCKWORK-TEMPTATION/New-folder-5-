| **القيود** | يجب ألا يتجاوز المقال 1500 كلمة، وأن يشتمل على اقتباسين على الأقل من خبراء في المدن الذكية. | يجب أن يعمل الكود على Python 3.9+، وأن يستخدم مكتبة Pillow لمعالجة الصور، وألا يحتوي على أي ثغرات أمنية معروفة. | يجب أن يتم الانتهاء من الخطة في غضون 5 أيام عمل، والميزانية المخصصة لمرحلة التخطيط لا تتجاوز 10,000 دولار. |

## المهارات المطلوبة لهندسة التوجيهات

يتطلب إتقان هندسة التوجيهات مجموعة من المهارات الأساسية:

1.  **إتقان اللغة:** فهم عميق للغة لإنشاء توجيهات واضحة ودقيقة لا لبس فيها [ref: 1-4].
2.  **تحليل البيانات وتفسيرها:** القدرة على اختبار وتحسين التوجيهات بشكل متكرر بناءً على تحليل المخرجات [ref: 1-4].
3.  **التخفيف من التحيز والوعي الأخلاقي:** فهم التحيزات المتأصلة في نماذج الذكاء الاصطناعي وكيفية معالجتها في التوجيهات [ref: 1-4].
4.  **التقييم النقدي:** القدرة على التحقق من الحقائق وتقييم جودة المحتوى الناتج عن الذكاء الاصطناعي [ref: 1-4].
5.  **حل المشكلات والإبداع:** القدرة على معالجة الأهداف المحددة وتوقع التحديات وتحسين التوجيهات [ref: 1-4].
6.  **القدرة على التكيف:** الاستعداد لتعلم أدوات وتقنيات ومنهجيات جديدة في مجال يتطور بسرعة [ref: 1-4].

## التوجهات المستقبلية في صياغة التوجيهات

يتجه المستقبل نحو وكلاء ذكاء اصطناعي أكثر استقلالية وقدرة على التخطيط والتفكير المنطقي [ref: 0-7, 0-8, 2-5]. هذا يتطلب توجيهات تسمح للنماذج بتوسيع قدراتها الاستدلالية (مثل تقنيات "سلسلة الأفكار" Chain of Thought) [ref: 0-7, 2-5].

*   **الوكلاء الهجينون:** ظهور نماذج هجينة تجمع بين قدرات النماذج اللغوية الكبيرة كـ"عقل" وخوارزميات تنفيذية مستقلة كـ"يد"، مما يتيح تنفيذ المهام بشكل مستقل مع إمكانية دمج نماذج خارجية [ref: 0-9].
*   **الشفافية والمراقبة:** أدوات مثل "نافذة كمبيوتر مانوس" (Manus Computer Window) تسمح بمراقبة إجراءات الوكيل في الوقت الفعلي والتدخل عند الضرورة، مما يوفر شفافية في عملية اتخاذ القرار [ref: 0-9]. هذا سيتطلب توجيهات تتضمن نقاط تحقق ومراقبة.
*   **التعلم المعزز بالاسترداد (RAG):** استخدام مصادر بيانات موثوقة وخارجية لتعزيز نماذج اللغة الكبيرة، مما يحسن من دقة السياق وملاءمة المخرجات [ref: 2-2]. ستصبح التوجيهات التي تحدد هذه المصادر أو تستفيد منها أكثر أهمية.
*   **تطوير نماذج الاستدلال:** النماذج التي يمكنها تفعيل أو تعطيل وضع "التفكير" عند الحاجة إليه، مما يسمح بتحقيق توازن بين الكفاءة والقدرة على التفكير المعقد [ref: 2-5].

## تقييم فعالية التوجيهات ومخرجات وكلاء الذكاء الاصطناعي

لضمان جودة عالية لمخرجات الذكاء الاصطناعي، يجب وضع إطار تقييم متين [ref: 2-2, 2-3]. يؤثر تصميم التوجيهات بشكل مباشر على جودة المخرجات، ويجب أن يخضع كل من التوجيهات والنتائج للتقييم.

*   **مراحل التقييم:**
    1.  **مرحلة بيانات التدريب:** جودة البيانات التي تُدرّب عليها النماذج تؤثر على جودة المخرجات، ومعظم النماذج التجارية لا تكشف عن مصادر بياناتها [ref: 2-2].
    2.  **مرحلة نموذج الذكاء الاصطناعي والتشغيل:** يمكن تعديل دقة وطلبات النموذج قبل الاستخدام النهائي من خلال الاختبار المستمر [ref: 2-2].
    3.  **مرحلة التأسيس:** تعزيز النموذج ببيانات موثوقة ورسمية من مصادر خارجية (RAG) لتقليل الأخطاء وزيادة التخصيص [ref: 2-2].
    4.  **مرحلة تقييم المستخدم النهائي:** يتضمن مراجعة بشرية دورية لاستجابات الذكاء الاصطناعي [ref: 2-2].

*   **معايير التقييم:**
    *   **الملاءمة الزمنية:** هل المعلومات حديثة؟ [ref: 2-2]
    *   **الأسلوب:** هل يتناسب الأسلوب مع الغرض؟ [ref: 2-2]
    *   **المصطلحات:** هل المصطلحات دقيقة؟ [ref: 2-2]
    *   **الدقة:** هل المعلومات دقيقة؟ [ref: 2-2]
    *   **الموضوعية:** هل الاستجابة تغطي الموضوعات الرئيسية؟ [ref: 2-2]
    *   **الفائدة:** هل كانت الاستجابة مفيدة؟ [ref: 2-2]
    *   **إضافية:** التحيز، التكلفة، الأثر البيئي، المساواة [ref: 2-2].

*   **طرق التقييم:**
    *   **التقييم البشري:** يقيم البشر مخرجات النموذج بناءً على معايير محددة (مستند إلى المرجع، مستند إلى الدرجات، اختبار A/B) [ref: 2-3]. يوفر فهمًا دقيقًا للفروق الدقيقة [ref: 2-3].
    *   **التقييم بمساعدة النماذج اللغوية الكبيرة (LLM-assisted evaluation):** تستخدم نماذج لغوية كبيرة لتقييم مخرجات نماذج أخرى، مما يوفر قابلية التوسع والاتساق [ref: 2-3].
    *   **التقييم القائم على الوظيفة (Function-based evaluation):** استخدام التعليمات البرمجية للتحقق من وجود عناصر محددة في المخرج [ref: 2-3].

**الخاتمة:**
إن صياغة التوجيهات الفعالة لوكلاء الذكاء الاصطناعي هي مهارة أساسية تتطور باستمرار. من خلال التركيز على الوضوح، والسياق، والشخصية، وهيكلة المخرجات، وتقديم الأمثلة، وتحديد القيود، واستخدام التغذية الراجعة، يمكن للمستخدمين تحسين جودة وتخصيص استجابات الذكاء الاصطناعي بشكل كبير. ومع استمرار تطور الذكاء الاصطناعي، ستصبح القدرة على تكييف هذه الممارسات مع القدرات الجديدة للوكلاء، مثل الاستدلال المعزز والتكامل مع المصادر الخارجية، أمرًا بالغ الأهمية لتحقيق أقصى استفادة من هذه التقنيات الثورية.