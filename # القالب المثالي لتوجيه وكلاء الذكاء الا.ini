تتضمن التوجيهات الفعالة للذكاء الاصطناعي عدة مكونات أساسية تضمن أن يفهم الوكيل المهمة على النحو المقصود وأن ينتج مخرجات عالية الجودة:

1.  **وضوح ودقة المهمة (Ask/Task)**: يجب أن تكون المهمة محددة وواضحة قدر الإمكان، مع البدء بأمر مباشر مثل "اكتب"، "لخص"، أو "حلل". لتجنب المصطلحات الغامضة أو الأسئلة الواسعة، يجب الحرص على أن تكون الحوافز محددة وواضحة للحصول على ردود أدق.
    *   **مثال:** بدلًا من "اشرح لي عن الرواية العربية"، استخدم "حلل تطور الرواية العربية في فترة الستينيات، مع التركيز على تأثير المد القومي على موضوعاتها وأساليب السرد فيها"<a class="reference" href="https://drsajed.website/?p=969" target="_blank">3</a>.

2.  **تحديد السياق والخلفية (Context/Framing)**: توفير معلومات خلفية كافية أمر حيوي لمساعدة الذكاء الاصطناعي على فهم الغرض والجمهور والقيود ذات الصلة. يشمل هذا من هو المرسل، وماذا يعمل عليه، ولمن هو المحتوى، ولماذا يهم ذلك<a class="reference" href="https://ae.linkedin.com/pulse/complete-guide-ai-prompting-from-beginner-mastery-james-henning-p0v0e?tl=ar" target="_blank">4</a>.
    *   **مثال:** "أنا قائد فريق في شركة برمجيات، أقوم بإعداد دليل انضمام لأعضاء فريق دعم العملاء الجدد. معظمهم محترفون في بداية مسيرتهم المهنية. أريدهم أن يشعروا بالثقة والاستعداد الجيد خلال أول أسبوعين"<a class="reference" href="https://ae.linkedin.com/pulse/complete-guide-ai-prompting-from-beginner-mastery-james-henning-p0v0e?tl=ar" target="_blank">4</a>.

3.  **توجيه الأسلوب والشخصية (Persona/Style)**: يمكن توجيه الذكاء الاصطناعي لتبني دور أو شخصية محددة (مثل "تصرف كما لو كنت مدير تسويق" أو "كاتب إبداعي") لتكييف أسلوب ونبرة الاستجابة مع الجمهور المستهدف والمحتوى المطلوب. يمكن أن تكون النبرة رسمية، غير رسمية، ودية، أو حماسية<a class="reference" href="https://khaledattia.com/prompt-engineering/" target="_blank">5</a>.
    *   **مثال:** "اكتب منشورًا ترويجيًا عن منتج جديد لنشره على إنستجرام بنبرة ودية وحماسية"<a class="reference" href="https://khaledattia.com/prompt-engineering/" target="_blank">5</a>.

4.  **طلب هيكلة منظمة للمخرجات (Output Format)**: تحديد التنسيق والشكل النهائي المطلوب للمخرجات يسهل فهمها واستخدامها. يمكن أن يكون على شكل نقاط، قوائم مرقمة، جداول، ملخصات، تعليمات برمجية، أو حتى بريد إلكتروني.
    *   **مثال:** "قدم هذا كمخطط منظم مع نقاط واضحة"<a class="reference" href="https://ae.linkedin.com/pulse/complete-guide-ai-prompting-from-beginner-mastery-james-henning-p0v0e?tl=ar" target="_blank">4</a>.

5.  **تقديم الأمثلة والنماذج (Examples/Model)**: توفير أمثلة جيدة لما هو مطلوب وأمثلة سيئة لما يجب تجنبه يساعد الذكاء الاصطناعي على فهم التوقعات بشكل أفضل وإنتاج محتوى يتوافق مع تفضيلاتك.
    *   **مثال:** "قسم التدريب الأمني الحالي لدينا يعمل بشكل جيد لأنه يتضمن سيناريوهات واقعية. نريد تجنب أي شيء مثل دليلنا التقني القديم، الذي كان مجرد جدار نصي بدون عناصر تفاعلية"<a class="reference" href="https://ae.linkedin.com/pulse/complete-guide-ai-prompting-from-beginner-mastery-james-henning-p0v0e?tl=ar" target="_blank">4</a>.

6.  **تحديد القيود والحدود (Rules/Constraints)**: وضع قيود واضحة على الرد، مثل عدد الكلمات، الإطار الزمني، أو المتطلبات الفنية، يساعد على تركيز استجابة الذكاء الاصطناعي وجعلها قابلة للتنفيذ.
    *   **مثال:** "يجب ألا يستغرق كل قسم أكثر من 4 ساعات لإكمالها. يجب أن تكون اللغة بسيطة وخالية من المصطلحات اللغوية"<a class="reference" href="https://ae.linkedin.com/pulse/complete-guide-ai-prompting-from-beginner-mastery-james-henning-p0v0e?tl=ar" target="_blank">4</a>.

7.  **الأسئلة المفتوحة والمتابعة (Follow-up Questions)**: استخدام أسئلة المتابعة للحصول على معلومات أعمق وتوضيحات إضافية يسمح بالتعمق في الموضوع ويحسن من جودة الردود<a class="reference" href="https://beam.ai/ar/agentic-insights/stop-wasting-prompts-10-ai-techniques-that-actually-work" target="_blank">1</a>. في بعض الحالات، يمكن أن تكون الأسئلة المفتوحة مفيدة للعصف الذهني<a class="reference" href="https://www.coursebox.ai/ar/blog/kyfy-ktb-rshdt-ldhk-lstnaay" target="_blank">6</a>.

8.  **طلب المصادر والمراجع:** لزيادة موثوقية المعلومات وقيمتها، يمكن طلب إشارة إلى دراسات ومصادر بارزة في المجال<a class="reference" href="https://drsajed.website/?p=969" target="_blank">3</a>.



| المكون الرئيسي للتوجيه | كتابة مقال إبداعي | تطوير تطبيق برمجي | إدارة مشروع |
| :--- | :--- | :--- | :--- |
| المهمة | اكتب مقالًا جذابًا عن مستقبل المدن الذكية في عام 2050، مع التركيز على دور التكنولوجيا الخضراء والذكاء الاصطناعي. | أنشئ نموذج كود Python لتطبيق ويب بسيط يسمح للمستخدمين بتحميل الصور وتطبيق مرشحات أساسية. | أعد خطة عمل مفصلة لمشروع إطلاق منتج جديد، مع تحديد المراحل الرئيسية والموارد المطلوبة والمواعيد النهائية. |
| السياق | المقال موجه لجمهور واسع من القراء المهتمين بالتكنولوجيا والاستدامة، سيُنشر على مدونة تقنية رائدة. | الكود مخصص لبيئة Flask ويجب أن يكون نظيفًا وقابلاً للتوسع، مع التركيز على سهولة الاستخدام للمطورين. | المشروع هو إطلاق تطبيق جوال لخدمات التوصيل في سوق جديد، والجمهور المستهدف هو الشباب في المناطق الحضرية. |
| الشخصية/الأسلوب | اكتب بأسلوب حماسي ومستقبلي، مع استخدام لغة بصرية غنية وإحصائيات مدعومة. | اكتب الكود والتعليقات بأسلوب احترافي وواضح، مع مراعاة أفضل ممارسات البرمجة لـ Python. | قدم الخطة بأسلوب رسمي وواثق، موجهًا لفريق الإدارة العليا مع التركيز على تحقيق الأهداف الاستراتيجية. |
| هيكلة المخرجات | يجب أن يتضمن المقال مقدمة، 3 أقسام رئيسية (التخطيط العمراني، الطاقة، النقل)، وخاتمة، وأن يكون مقسمًا إلى فقرات قصيرة وعناوين فرعية. | يجب أن يتضمن الكود وحدات واضحة للمصادقة ومعالجة الصور وواجهة المستخدم، مع توفير أمثلة للاستخدام. | يجب أن تكون الخطة في شكل جدول يتضمن المهام، المسؤوليات، المواعيد النهائية، والحالة، بالإضافة إلى ملخص تنفيذي. |
| الأمثلة | إليك مثال على مقال سابق حاز على إعجاب كبير بأسلوبه: [رابط لمقال]. | راجع هذا المستودع على GitHub للحصول على أمثلة للكود النظيف الذي نهدف إليه: [رابط]. | هذه خطة مشروع سابقة ناجحة يمكن أن تكون مرجعًا: [رابط لوثيقة خطة مشروع]. |
| القيود | يجب ألا يتجاوز المقال 1500 كلمة، وأن يشتمل على اقتباسين على الأقل من خبراء في المدن الذكية. | يجب أن يعمل الكود على Python 3.9+، وأن يستخدم مكتبة Pillow لمعالجة الصور، وألا يحتوي على أي ثغرات أمنية معروفة. | يجب أن يتم الانتهاء من الخطة في غضون 5 أيام عمل، والميزانية المخصصة لمرحلة التخطيط لا تتجاوز 10,000 دولار. |


## أمثلة عملية لاستخدام القالب

لتعزيز فهم كيفية تطبيق المكونات الرئيسية للتوجيهات الفعالة لوكلاء الذكاء الاصطناعي، من الضروري استعراض أمثلة عملية توضح كيفية تكييف هذه المكونات مع سياقات ومهام متنوعة. توضح الأمثلة التالية كيفية صياغة التوجيهات لكل من كتابة مقال إبداعي، وتطوير تطبيق برمجي، وإدارة مشروع، مع التركيز على تحديد كل مكون من مكونات القالب بوضوح.

يوضح الجدول التالي أمثلة تطبيقية لكيفية تحديد المكونات الأساسية للتوجيه (المهمة، السياق، الشخصية/الأسلوب، هيكلة المخرجات، الأمثلة، القيود) عبر ثلاث مهام مختلفة، مما يبرز المرونة والتخصيص المطلوبين لضمان أفضل النتائج من وكيل الذكاء الاصطناعي .



